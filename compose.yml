name: transitops

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: transitops
      POSTGRES_USER: transitops
      POSTGRES_PASSWORD: transitops
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transitops -d transitops"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    profiles: ["extended"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    profiles: ["extended"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: transitops
      MINIO_ROOT_PASSWORD: transitops-local-only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
