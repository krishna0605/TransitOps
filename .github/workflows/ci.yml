name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_APP_NAME: TransitOps
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/web lint
      - run: pnpm --dir apps/web format:check
      - run: pnpm --dir apps/web typecheck
      - run: pnpm --dir apps/web test
      - run: pnpm --dir apps/web build

  api:
    name: API checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: test
      DATABASE_CHECK_ON_STARTUP: "false"
      DATABASE_URL: postgresql+psycopg://transitops:transitops@localhost:5432/transitops
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: transitops
          POSTGRES_USER: transitops
          POSTGRES_PASSWORD: transitops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U transitops -d transitops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.lock
      - run: python -m pip install -r apps/api/requirements.lock
      - run: python -m pip install --no-deps -e apps/api
      - run: python -m ruff check apps/api scripts
      - run: python -m ruff format --check apps/api scripts
      - run: python -m mypy apps/api/app apps/api/tests/typecheck
      - run: python -m pytest apps/api
      - run: python -m alembic -c apps/api/alembic.ini heads
      - run: python -m alembic -c apps/api/alembic.ini upgrade head
      - run: python -m alembic -c apps/api/alembic.ini downgrade base
      - run: python -m alembic -c apps/api/alembic.ini upgrade head

  contract:
    name: API contract checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: test
      DATABASE_CHECK_ON_STARTUP: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.lock
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install -r apps/api/requirements.lock
      - run: python -m pip install --no-deps -e apps/api
      - run: pnpm api:check
      - run: pnpm typecheck:client

  web-e2e:
    name: Web layout checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_APP_NAME: TransitOps
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/web build
      - run: pnpm --dir apps/web exec playwright install --with-deps chromium
      - run: pnpm --dir apps/web test:e2e

  backend-container:
    name: Backend container checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: transitops-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: transitops-api:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - run: docker compose config --quiet
      - run: docker compose up -d --wait api worker
      - run: curl --fail http://localhost:8000/api/v1/health/ready
      - if: always()
        run: docker compose logs --no-color api worker migrate postgres redis minio
      - if: always()
        run: docker compose down -v
